<!-- FAST2SMS REPLACEMENT (OTP send function mein) -->
<script>
// Ye function apne existing OTP send code ki jagah use karo
async function sendOtpViaSMS(mobile, otp) {
  try {
    const res = await fetch('https://saluja-proxy.vercel.app/api/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mobile: mobile, otp: otp })
    });
    const data = await res.json();
    return data;
  } catch (e) {
    console.error('OTP send error:', e);
  }
}
</script>

<!-- FIREBASE CONFIG REPLACEMENT -->
<script>
async function initFirebaseSecure() {
  try {
    const res = await fetch('https://saluja-proxy.vercel.app/api/firebase-config');
    if (!res.ok) throw new Error('Config fetch failed');
    const config = await res.json();
    
    // Firebase already initialized check
    if (!firebase.apps.length) {
      firebase.initializeApp(config);
    }
    
    console.log('Firebase initialized securely ✅');
  } catch (e) {
    console.error('Firebase config error:', e);
  }
}

// App load hone pe call karo
window.addEventListener('load', function() {
  initFirebaseSecure();
});
</script>
